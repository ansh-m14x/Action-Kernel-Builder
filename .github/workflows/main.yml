name: Build Little Kernel

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Source
        run: |
          # 1. Check if lk/ exists
          if [ -d "lk" ]; then
            echo "Found lk directory, moving contents to root..."
            cp -r lk/* .
          else
            echo "lk directory not found! Checking current files:"
            ls -F
            # If the files are already in root, this script does nothing
          fi

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi make

      - name: Build LK
        run: |
          # Verify Makefile exists before building
          if [ -f "Makefile" ]; then
            make PROJECT=k65v1_64_bsp TOOLCHAIN_PREFIX=arm-none-eabi-
          else
            echo "Makefile not found in root! Aborting."
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lk-binaries
          path: build-k65v1_64_bsp/lk.bin

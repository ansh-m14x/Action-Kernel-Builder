name: OZIP Decrypter

on:
  workflow_dispatch:

env:
  FIRMWARE_LINK: https://assorted.downloads.oppo.com/firmware/CPH2015/CPH2015PUEX_11_OTA_0610_all_wv6l4jM4JLIV.ozip
  FIRMWARE_NAME: CPH2015PUEX_11_OTA_0610_all_wv6l4jM4JLIV.ozip
  FIRMWARE_ZIP_NAME: CPH2015
  TZ: Asia/Kolkata

jobs:
  build:
    runs-on: ubuntu-22.04
    # Release create karne ke liye ye permissions zaruri hain
    permissions:
      contents: write

    steps:
       - name: Checkout
         uses: actions/checkout@v4
         
       - name: Downloading Ozip Now.. 
         run: |
            sudo apt-get update
            sudo apt install aria2 python3-pip zip -y
            aria2c "$FIRMWARE_LINK"
             
       - name: Decrypting Ozip Now
         run: |
             pip3 install setuptools wheel docopt pycryptodome
             wget https://raw.githubusercontent.com/techyminati/oppo_ozip_decrypt/master/ozipdecrypt.py
             python3 ozipdecrypt.py "$FIRMWARE_NAME"
             zip -r "$FIRMWARE_ZIP_NAME.zip" ./out/*

       - name: Upload to Artifacts (Backup)
         uses: actions/upload-artifact@v4
         with:
           name: Decrypted-CPH2015
           path: ./*.zip
           retention-days: 7

       - name: Create GitHub Release (Public Link)
         uses: softprops/action-gh-release@v2
         with:
           tag_name: Decrypted_${{ github.run_number }}
           name: Decrypted Firmware CPH2015 (Build ${{ github.run_number }})
           body: |
             OZIP Decrypted successfully.
             Filename: ${{ env.FIRMWARE_ZIP_NAME }}.zip
           files: ./*.zip
         env:
           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

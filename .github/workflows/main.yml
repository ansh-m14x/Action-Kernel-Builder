name: Build Little Kernel

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Workspace
        run: |
          # Copy source contents to root so the Makefile is found
          cp -r ./lk/* .
          
          # Patch security: Disable Verified Boot to avoid bootlooping on custom builds
          sed -i 's/MTK_VERIFIED_BOOT_SUPPORT := yes/MTK_VERIFIED_BOOT_SUPPORT := no/g' project/k65v1_64_bsp.mk
          sed -i 's/MTK_VERIFIED_BOOT_SUPPORT = yes/MTK_VERIFIED_BOOT_SUPPORT = no/g' project/k65v1_64_bsp.mk

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi make

      - name: Build LK
        run: |
          # Build using the PROJECT variable and explicit toolchain prefix
          make PROJECT=k65v1_64_bsp TOOLCHAIN_PREFIX=arm-none-eabi-

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lk-binaries
          path: |
            build-k65v1_64_bsp/lk.bin
            build-k65v1_64_bsp/lk.elf

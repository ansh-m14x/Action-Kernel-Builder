name: Build Little Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi make

      - name: Build LK
        # Using the PROJECT variable as defined in your Makefile
        run: |
          make PROJECT=k65v1_64_bsp

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lk-binaries
          path: |
            build-k65v1_64_bsp/lk.bin
            build-k65v1_64_bsp/lk.elf

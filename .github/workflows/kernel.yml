name: Build Oppo A31 Kernel

on:
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libncurses5 git ccache automake flex lzop bison gperf build-essential \
          zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev \
          libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool \
          dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen \
          libswitch-perl policycoreutils minicom libxml-sax-base-perl \
          libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev \
          libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip \
          device-tree-compiler python2 python3
    - name: Setup Toolchains and Source
      run: |
        mkdir -p $GITHUB_WORKSPACE/work
        cd $GITHUB_WORKSPACE/work
        
        # Download Clang - Using a direct link from Android's Gitiles 'tgz' archive
        mkdir clang
        curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-9.0.0_r3/clang-4691093.tar.gz" -o clang.tgz
        
        # Check if the file is actually a gzip before extracting
        if file clang.tgz | grep -q 'gzip'; then
          tar -xzf clang.tgz -C clang
        else
          echo "Download failed or link is dead. File content:"
          cat clang.tgz | head -n 5
          exit 1
        fi
        
        # Clone GCC Toolchains
        git clone --depth=1 "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9" -b master-kernel-build-2021 x64
        git clone --depth=1 "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9" -b master-kernel-build-2021 x32
        
        # Clone Kernel Source
        git clone --depth=1 "https://github.com/ansh-m14x/android_kernel_oppo_cph2015" -b main myKernel


    - name: Compile Kernel
      run: |
        cd $GITHUB_WORKSPACE/work/myKernel
        
        # Set Paths
        export PATH="$GITHUB_WORKSPACE/work/clang/bin:$GITHUB_WORKSPACE/work/x64/bin:$GITHUB_WORKSPACE/work/x32/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        
        # Build Command
        make O=out ARCH=arm64 CC=clang HOSTCC=clang DTC=dtc \
             CLANG_TRIPLE=aarch64-linux-gnu- \
             CROSS_COMPILE=aarch64-linux-androidkernel- \
             CROSS_COMPILE_ARM32=arm-linux-androideabi- \
             oppo6765_19581_defconfig
             
        make -j$(nproc --all) O=out ARCH=arm64 CC=clang HOSTCC=clang DTC=dtc \
             CLANG_TRIPLE=aarch64-linux-gnu- \
             CROSS_COMPILE=aarch64-linux-androidkernel- \
             CROSS_COMPILE_ARM32=arm-linux-androideabi- 2>&1 | tee build.log

    - name: Check for Output
      run: |
        if [ -f $GITHUB_WORKSPACE/work/myKernel/out/arch/arm64/boot/Image.gz-dtb ]; then
           echo "Build Successful!"
        else
           echo "Build Failed!"
           exit 1
        fi

    - name: Upload Kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: Oppo-A31-Kernel
        path: |
          work/myKernel/out/arch/arm64/boot/Image.gz-dtb
          work/myKernel/build.log

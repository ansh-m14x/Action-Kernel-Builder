name: Build Kernel

on: 
  workflow_dispatch:
    inputs:
      DEVICE_NAME:
        description: 'zip name'
        required: true
        default: 'OppoA31'
      ANDROID_VERSION:
        description: 'Android Version'
        required: true
        default: 's-oss'
        type: choice
        options:
        - t-oss
        - s-oss
        - p-oss
        - q-oss

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Packages
      run: |
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python2 python3

    - name: Start Building Kernel
      run: |
        # Fix the Qualcomm smem.h error before running the build
        find . -name "oppo_secure_common.c" -exec sed -i 's/#include <soc\/qcom\/smem.h>/\/\/ #include <soc\/qcom\/smem.h>/g' {} +
        
        chmod +x build
        export KBUILD_BUILD_USER="${{ github.actor }}"
        export KBUILD_BUILD_HOST="${{ github.event.inputs.DEVICE_NAME }}"
        ./build

    - name: Set Properties
      id: props
      run: |
        echo "date=$(TZ=Asia/Manila date +%Y%m%d-%I%M%p)" >> $GITHUB_OUTPUT

    - name: Compressed as Archive
      if: always()
      run: |
        # Navigate to the boot folder (checking both possible structures)
        [ -d myKernel/out/arch/arm64/boot ] && cd myKernel/out/arch/arm64/boot || cd out/arch/arm64/boot || echo "No boot dir found"
        
        if [ -f Image.gz-dtb ] || [ -f Image ]; then
          zip -r9 "${{ github.event.inputs.DEVICE_NAME }}-${{ steps.props.outputs.date }}.zip" ./* -x "dts/*"
          echo "ZIP_PATH=$(pwd)/${{ github.event.inputs.DEVICE_NAME }}-${{ steps.props.outputs.date }}.zip" >> $GITHUB_ENV
        fi

    - name: Release
      uses: ncipollo/release-action@v1.12.0
      if: always()
      with:
        artifacts: |
          ${{ env.ZIP_PATH }}
          build.log
          **/build.log
        name: Compiled Kernel for ${{ github.event.inputs.DEVICE_NAME }} - ${{ steps.props.outputs.date }}
        tag: ${{ github.run_id }}-${{ steps.props.outputs.date }}
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          Build finished for ${{ github.event.inputs.DEVICE_NAME }}.
          Check the build.log if the ZIP is missing.

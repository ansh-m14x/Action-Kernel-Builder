name: Build Oppo A31 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libncurses5 git ccache automake flex lzop bison gperf build-essential \
          zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev \
          libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool \
          dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen \
          libswitch-perl policycoreutils minicom libxml-sax-base-perl \
          libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev \
          libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip \
          device-tree-compiler python2 python3

    - name: Setup Toolchains and Source
      run: |
        mkdir -p $GITHUB_WORKSPACE/work
        cd $GITHUB_WORKSPACE/work
        
        # 1. Download Clang (Android 9.0.0_r3 version)
        # Using a reliable mirror to avoid Google's "Not a Robot" check
        git clone --depth=1 https://github.com/Daisuke-E/azure-clang.git clang
        
        # 2. Clone GCC 64-bit (AOSP 4.9 Mirror)
        git clone --depth=1 https://github.com/lineageos-mirror/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git -b lineage-16.0 x64
        
        # 3. Clone GCC 32-bit (AOSP 4.9 Mirror)
        git clone --depth=1 https://github.com/lineageos-mirror/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git -b lineage-16.0 x32
        
        # 4. Clone Kernel Source
        git clone --depth=1 "https://github.com/ansh-m14x/android_kernel_oppo_cph2015" -b main myKernel

    - name: Compile Kernel
      run: |
        cd $GITHUB_WORKSPACE/work/myKernel
        
        # Set Environment Paths
        export PATH="$GITHUB_WORKSPACE/work/clang/bin:$GITHUB_WORKSPACE/work/x64/bin:$GITHUB_WORKSPACE/work/x32/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        export KBUILD_BUILD_USER="Ansh"
        export KBUILD_BUILD_HOST="GitHub-Actions"

        # Step 1: Defconfig
        make O=out ARCH=arm64 CC=clang \
             CLANG_TRIPLE=aarch64-linux-gnu- \
             CROSS_COMPILE=aarch64-linux-android- \
             CROSS_COMPILE_ARM32=arm-linux-androideabi- \
             oppo6765_19581_defconfig
             
        # Step 2: Build
        make -j$(nproc --all) O=out ARCH=arm64 CC=clang \
             CLANG_TRIPLE=aarch64-linux-gnu- \
             CROSS_COMPILE=aarch64-linux-android- \
             CROSS_COMPILE_ARM32=arm-linux-androideabi- 2>&1 | tee build.log

    - name: Check for Kernel Output
      run: |
        # Checks for common MT6765 output names
        if [ -f $GITHUB_WORKSPACE/work/myKernel/out/arch/arm64/boot/Image.gz-dtb ] || [ -f $GITHUB_WORKSPACE/work/myKernel/out/arch/arm64/boot/Image.gz ]; then
           echo "Build Successful!"
        else
           echo "Build Failed! Displaying last 100 lines of log:"
           tail -n 100 $GITHUB_WORKSPACE/work/myKernel/build.log
           exit 1
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Oppo-A31-Kernel
        path: |
          work/myKernel/out/arch/arm64/boot/Image.gz*
          work/myKernel/build.log

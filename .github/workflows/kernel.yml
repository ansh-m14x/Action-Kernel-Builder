
name: A31 Kernel Build (MT6765)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-24.04 # Latest Noble runner
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Install Build Packages (Legacy Noble Fix)
      run: |
        # Focal repos for Python 2 & libncurses5
        echo "deb http://archive.ubuntu.com/ubuntu/ focal main universe" | sudo tee -a /etc/apt/sources.list
        sudo apt-get update
        
        sudo apt-get -y install libncurses5 python2 python3 \
        git ccache automake flex lzop bison gperf build-essential zip curl \
        zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev \
        libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool \
        make optipng maven libssl-dev pwgen bc libc6-dev-i386 \
        libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip \
        device-tree-compiler libtinfo5
        
        # Symlink fix for MTK Scripts
        sudo ln -sf /usr/bin/python2 /usr/bin/python

    - name: Install Google Repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Download Toolchains
      run: |
        mkdir -p ${{ github.workspace }}/tools
        # KAGA-KOKO Clang 6.0.2
        git clone https://github.com/KAGA-KOKO/clang-6.0.2 -b clang --depth=1 ${{ github.workspace }}/tools/clang
        # AOSP GCC 4.9 (Essential for 4.9 Kernel)
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 -b ndk-release-r16 --depth=1 ${{ github.workspace }}/tools/gcc64
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b ndk-release-r16 --depth=1 ${{ github.workspace }}/tools/gcc32

    - name: Compile Kernel
      run: |
        # Setup PATH
        export PATH=${{ github.workspace }}/tools/clang/bin:${{ github.workspace }}/tools/gcc64/bin:${{ github.workspace }}/tools/gcc32/bin:$PATH
        
        # Environment Vars
        export ARCH=arm64
        export SUBARCH=arm64
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_ARM32=arm-linux-androideabi-
        
        # Build logic
        cd kernel-4.9
        make O=out clean
        make O=out mrproper
        
        # Use your project specific defconfig
        make O=out oppo6765_19581_defconfig
        
        # Compile command
        make -j$(nproc) O=out \
             CC=clang \
             CLANG_TRIPLE=$CLANG_TRIPLE \
             CROSS_COMPILE=$CROSS_COMPILE \
             CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 \
             Image.gz-dtb

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: A31-Kernel-Image
        path: |
          kernel-4.9/out/arch/arm64/boot/Image.gz-dtb
          kernel-4.9/out/.config

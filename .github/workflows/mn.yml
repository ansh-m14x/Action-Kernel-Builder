name: Extract A.15 and Send to Telegram

on:
  workflow_dispatch:

jobs:
  extract_and_send:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Firmware using Wget
        run: |
          # Robust wget method to handle large GDrive file confirmation
          wget --load-cookies /tmp/cookies.txt "https://docs.google.com/uc?export=download&confirm=$(wget --quiet --save-cookies /tmp/cookies.txt --keep-session-cookies --no-check-certificate 'https://docs.google.com/uc?export=download&id=187w6fe7v8AZNuo7O62R1RKiTBjCtEfS7' -O- | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1\n/p')&id=187w6fe7v8AZNuo7O62R1RKiTBjCtEfS7" -O firmware.zip && rm -rf /tmp/cookies.txt

      - name: Extract vendor.img and boot.img
        run: |
          mkdir -p extracted_files
          unzip firmware.zip "*vendor.img*" "*boot.img*" -d extracted_files/
          # Move files to root regardless of their path inside the zip
          find extracted_files/ -name "vendor.img" -exec mv {} . \;
          find extracted_files/ -name "boot.img" -exec mv {} . \;

      - name: Compress Images into tar.xz
        run: |
          tar -cvJf Oppo_A31_A15_Images.tar.xz vendor.img boot.img

      - name: Upload to Telegram
        run: |
          curl -v -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
               -F "document=@Oppo_A31_A15_Images.tar.xz" \
               -F "caption=📦 Oppo A31 A.15 Partitions Extracted%0A%0A✅ vendor.img%0A✅ boot.img%0A%0A@ITZ_ANSH" \
               https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: A.15-Assets
          name: Oppo A31 A.15 Partition Images
          files: Oppo_A31_A15_Images.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Extract A.15 Firmware Assets

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Firmware using Curl
        run: |
          # Bypasses the "Google Drive can't scan for viruses" warning for large files
          CONFIRM=$(curl -sL "https://drive.google.com/uc?export=download&id=187w6fe7v8AZNuo7O62R1RKiTBjCtEfS7" | grep -o 'confirm=[^&?%]*' | head -1)
          curl -L "https://drive.google.com/uc?export=download&id=187w6fe7v8AZNuo7O62R1RKiTBjCtEfS7&$CONFIRM" -o firmware.zip

      - name: List All Files
        run: |
          echo "### Contents of the firmware package:"
          unzip -l firmware.zip

      - name: Extract vendor.img and boot.img
        run: |
          mkdir -p extracted_files
          # Use wildcards to extract images regardless of internal directory structure
          unzip firmware.zip "*vendor.img*" "*boot.img*" -d extracted_files/
          
          # Flatten the structure so images are in the root
          find extracted_files/ -name "vendor.img" -exec mv {} . \;
          find extracted_files/ -name "boot.img" -exec mv {} . \;

      - name: Compress Images into tar.xz
        run: |
          # xz provides high compression to save you download time/data
          tar -cvJf Oppo_A31_A15_Images.tar.xz vendor.img boot.img

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: A.15-Assets
          name: Oppo A31 A.15 Partition Images
          body: |
            Extracted from Oppo_A31_CPH2015_EX_11_A.15 firmware.
            - boot.img
            - vendor.img
          files: Oppo_A31_A15_Images.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
